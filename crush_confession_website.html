<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hai</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    max-width:500px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    margin-top:0;
}

p{
    font-size:18px;
}

.buttons{
    margin-top:30px;
}

button{
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:10px;
    transition:0.3s;
}

#yes{
    background:#ff4d6d;
    color:white;
}

#yes:hover{
    transform:scale(1.1);
}

#no{
    background:#ddd;
}

.hearts{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    overflow:hidden;
}

.heart{
    position:absolute;
    color:#ff4d6d;
    font-size:20px;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-10vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>Haiii...</h1>

<p>Aku minta maaf buat apa yang aku lakuin, aku berkali kali kaya gini...</p>

<p>Aku udah gamau janji-janji lagi, tapi aku mau berubah</p>

<h2>Will you be my gf please? ❤️</h2>

<div class="buttons">
<button id="yes">Yes ❤️</button>
<button id="no">No 😅</button>
</div>

<p id="response"></p>

</div>

<div class="hearts" id="hearts"></div>

<script>
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const response = document.getElementById("response");

// jika klik iya

yesBtn.onclick = () => {
    response.innerHTML = "YAY! Aku senang banget 😭❤️";
    createHearts();
}

// tombol tidak kabur

noBtn.addEventListener("mouseover", () => {
    const i = Math.floor(Math.random()*300)-150;
    const j = Math.floor(Math.random()*300)-150;
    noBtn.style.transform = `translate(${i}px,${j}px)`;
});

// animasi hati

function createHearts(){
    const heartsContainer = document.getElementById("hearts");

    setInterval(()=>{
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random()*100 + "vw";
        heart.style.fontSize = (Math.random()*20+10)+"px";
        heartsContainer.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },6000);

    },200);
}
</script>

</body>
</html>
